<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Tours</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #151a2e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background: #4f7cff;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin-top: 10px;
            user-select: none;
        }

        .btn:hover {
            opacity: 0.95;
        }

        .task {
            margin-top: 10px;
        }

        .chat-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }

        .chat-box {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            white-space: pre-line;
            line-height: 1.5;
            max-width: 75%;
        }

        .message.user {
            background: #4f7cff;
            align-self: flex-end;
        }

        .message.bot {
            background: #222a47;
            align-self: flex-start;
        }

        .message.system {
            background: #3a3f57;
            align-self: flex-start;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
            margin-bottom: 8px;
        }

        .quick-reply-btn {
            background: #222a47;
            color: white;
            border: 1px solid #4f7cff;
            border-radius: 999px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
        }

        .quick-reply-btn:hover {
            background: #2d3760;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>👨‍🚀 Привет, Алекс</h2>
        <p>День 1 — Добро пожаловать</p>
        <p>Прогресс: <span id="progress">0</span>/4</p>
        <div class="btn" onclick="startAdaptation()">Начать адаптацию</div>
    </div>

    <div class="card">
        <h3>📋 Задачи</h3>
        <div class="task"><input type="checkbox" onclick="updateTask(this)"> Ознакомиться с должностной инструкцией</div>
        <div class="task"><input type="checkbox" onclick="updateTask(this)"> Изучить оргполитику</div>
        <div class="task"><input type="checkbox" onclick="updateTask(this)"> Настроить подпись</div>
        <div class="task"><input type="checkbox" onclick="updateTask(this)"> Пройти обучение</div>
    </div>

    <div class="card">
        <h3>🤖 HR-ассистент</h3>
        <input
            id="input"
            class="chat-input"
            placeholder="Напиши вопрос..."
        >
        <div class="btn" onclick="sendMessage()">Отправить</div>
        <div id="chat" class="chat-box"></div>
        <div id="quickReplies" class="quick-replies"></div>
    </div>

    <script>
        const API_URL = "https://galactic-tours-demo-backend-production.up.railway.app/api/message";
        const SESSION_ID = "demo";

        let count = 0;
        let botStarted = false;

        function updateTask(el) {
            if (el.checked) {
                count++;
            } else {
                count--;
            }
            document.getElementById("progress").innerText = count;
        }

        function startAdaptation() {
            alert("🚀 Адаптация началась!");
        }

        function addMessage(text, type) {
            const chat = document.getElementById("chat");
            const msg = document.createElement("div");
            msg.className = `message ${type}`;
            msg.innerText = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function clearQuickReplies() {
            const container = document.getElementById("quickReplies");
            container.innerHTML = "";
        }

        function renderQuickReplies(replies) {
            clearQuickReplies();

            if (!replies || !Array.isArray(replies) || replies.length === 0) {
                return;
            }

            const container = document.getElementById("quickReplies");

            replies.forEach(reply => {
                const btn = document.createElement("button");
                btn.className = "quick-reply-btn";
                btn.innerText = reply;
                btn.onclick = () => {
                    sendPresetMessage(reply);
                };
                container.appendChild(btn);
            });
        }

        async function callBot(text, showUserMessage = true) {
            if (showUserMessage) {
                addMessage(text, "user");
            }

            clearQuickReplies();

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: SESSION_ID,
                        text: text
                    })
                });

                if (!res.ok) {
                    addMessage("Ошибка сервера: " + res.status, "system");
                    return;
                }

                const data = await res.json();

                if (!data.reply) {
                    addMessage("Ответ пустой", "system");
                    return;
                }

                addMessage(data.reply, "bot");
                renderQuickReplies(data.quick_replies);
            } catch (error) {
                addMessage("Ошибка подключения: " + error.message, "system");
                console.error(error);
            }
        }

        async function startBot() {
            if (botStarted) return;
            botStarted = true;
            await callBot("__start__", false);
        }

        async function sendMessage() {
            const input = document.getElementById("input");
            const text = input.value.trim();

            if (!text) return;

            await callBot(text, true);
            input.value = "";
            input.focus();
        }

        async function sendPresetMessage(text) {
            await callBot(text, true);
        }

        document.getElementById("input").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        window.addEventListener("load", function() {
            startBot();
        });
    </script>

</body>
</html>
