<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Galactic Tours</title>
    <style>
        body {
            font-family: Arial;
            background: #0b0f1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #151a2e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background: #4f7cff;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin-top: 10px;
        }

        .task {
            margin-top: 10px;
        }

        .done {
            text-decoration: line-through;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>👨‍🚀 Привет, Алекс</h2>
    <p>День 1 — Добро пожаловать</p>
    <p>Прогресс: <span id="progress">0</span>/4</p>

    <div class="btn" onclick="start()">Начать адаптацию</div>
</div>

<div class="card">
    <h3>📋 Задачи</h3>

    <div class="task"><input type="checkbox" onclick="update(this)"> Ознакомиться с должностной инструкцией</div>
    <div class="task"><input type="checkbox" onclick="update(this)"> Изучить оргполитику</div>
    <div class="task"><input type="checkbox" onclick="update(this)"> Настроить подпись</div>
    <div class="task"><input type="checkbox" onclick="update(this)"> Пройти обучение</div>

</div>

<script>
let count = 0;

function update(el) {
    if (el.checked) count++;
    else count--;
    document.getElementById("progress").innerText = count;
}

function start() {
    alert("🚀 Адаптация началась!");
}
</script>

    <div class="card">
    <h3>🤖 HR-ассистент</h3>
    <input id="input" placeholder="Напиши вопрос..." style="width:100%; padding:10px;">
    <div class="btn" onclick="send()">Отправить</div>
    <p id="response"></p>
</div>

<script>
async function send() {
    const text = document.getElementById("input").value;

    const res = await fetch("https://galactic-tours-demo-backend-production.up.railway.app/api/message", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            session_id: "demo",
            text: text
        })
    });

    const data = await res.json();

    document.getElementById("response").innerText = data.reply;
}
</script>
</body>
</html>
